name: CI

on:
  push:
  pull_request:

jobs:
  # Auto-fix formatting and fixable lint issues, then commit back.
  # Unfixable lint errors still fail the job so they don't silently land.
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    # Skip if the commit was already made by this job to avoid infinite loops
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5

      - name: Fix imports and auto-fixable lint issues
        run: uv run --with ruff ruff check --fix .

      - name: Format code
        run: uv run --with ruff ruff format .

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: auto-fix with ruff"
            git push
          fi

      # After auto-fixing, catch anything ruff couldn't fix automatically
      - name: Check for remaining lint errors
        run: uv run --with ruff ruff check .

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the latest commit, which may include the auto-fix commit
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v5

      - name: Install package and dev dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Run tests
        run: pytest
