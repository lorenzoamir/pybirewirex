name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-manylinux-x86_64
            cibw_skip: "*-musllinux* *-win32 *-manylinux_i686 pp*"
          - os: ubuntu-latest
            artifact: linux-musllinux-x86_64
            cibw_skip: "*-manylinux* *-win32 pp*"
          - os: ubuntu-24.04-arm
            artifact: linux-manylinux-aarch64
            cibw_skip: "*-musllinux* pp*"
          - os: ubuntu-24.04-arm
            artifact: linux-musllinux-aarch64
            cibw_skip: "*-manylinux* pp*"
          - os: macos-latest
            artifact: macos
            cibw_skip: "pp*"
          - os: windows-latest
            artifact: windows
            cibw_skip: "*-win32 pp*"

    steps:
      - uses: actions/checkout@v4

      - uses: pypa/cibuildwheel@v2.23.0
        env:
          CIBW_SKIP: ${{ matrix.cibw_skip }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.artifact }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build && python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
