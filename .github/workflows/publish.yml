name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.python }}-${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        python: [cp310, cp311, cp312, cp313]
        platform:
          - name: linux-manylinux-x86_64
            os: ubuntu-latest
            cibw_skip: "*-musllinux* *-win32 *-manylinux_i686 pp*"
          - name: linux-musllinux-x86_64
            os: ubuntu-latest
            cibw_skip: "*-manylinux* *-win32 pp*"
          - name: linux-manylinux-aarch64
            os: ubuntu-24.04-arm
            cibw_skip: "*-musllinux* pp*"
          - name: linux-musllinux-aarch64
            os: ubuntu-24.04-arm
            cibw_skip: "*-manylinux* pp*"
          - name: macos
            os: macos-latest
            cibw_skip: "pp*"
          - name: windows
            os: windows-latest
            cibw_skip: "*-win32 pp*"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: pypa/cibuildwheel@v2.23.0
        env:
          CIBW_BUILD: "${{ matrix.python }}-*"
          CIBW_SKIP: ${{ matrix.platform.cibw_skip }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.python }}-${{ matrix.platform.name }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build && python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
