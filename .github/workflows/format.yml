name: Auto-format

on:
  push:
    branches: [main]

jobs:
  format:
    name: ruff format and commit
    runs-on: ubuntu-latest
    # Skip if the commit was already made by this workflow to avoid infinite loops
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a token with write access so the bot can push the commit
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5

      - name: Run ruff format
        run: uv run --with ruff ruff format .

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: auto-format with ruff"
            git push
          fi
